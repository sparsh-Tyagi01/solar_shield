services:
  # Backend API
  - type: web
    name: solarsheild-backend
    env: python
    buildCommand: "pip install -r requirements.txt && chmod +x start_server.sh"
    startCommand: "bash start_server.sh"
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: API_HOST
        value: 0.0.0.0
      - key: API_DEBUG
        value: False
      - key: FRONTEND_URL
        sync: false
      - key: N2YO_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /

