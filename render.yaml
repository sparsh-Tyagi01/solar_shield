services:
  # Backend API
  - type: web
    name: solarsheild-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: API_HOST
        value: 0.0.0.0
      - key: API_DEBUG
        value: False
      - key: FRONTEND_URL
        sync: false
      - key: N2YO_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /

